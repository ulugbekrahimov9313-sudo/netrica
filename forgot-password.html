<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Netrica.com — Forgot password</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="forgot">
  <div id="app-header"></div>

  <main id="main" class="container auth-shell">
    <section class="section auth-layout auth-layout-single">
      <div class="card pad auth-card auth-card-compact">
        <div class="section-title stack">
          <h2 data-i18n="page.forgot.title"></h2>
          <p class="muted" data-i18n="page.forgot.subtitle"></p>
        </div>
        <form id="forgot-form" class="form">
          <div class="field">
            <label for="email" data-i18n="page.forgot.email"></label>
            <input id="email" type="email" required />
          </div>
          <button class="btn primary auth-submit" type="submit" data-i18n="page.forgot.button"></button>
          <div class="small auth-links"><a href="login.html" data-i18n="page.forgot.back"></a></div>
        </form>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="assets/js/i18n-fallback.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
