<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Netrica.com — Subscriptions</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-protected="1" data-page="subscriptions">
  <div id="app-header"></div>

  <main id="main" class="container">
    <a href="index.html" class="btn" style="display:inline-flex;align-items:center;gap:6px;margin:18px 0 0;padding:8px 22px;border-radius:999px;font-size:.95rem;border:1px solid rgba(140,120,255,.18);background:rgba(140,120,255,.08);color:var(--text);text-decoration:none;width:fit-content">&larr; Orqa</a>
    <section class="section page-intro page-intro-subs">
      <div class="page-intro-copy">
        <div class="hero-badge" data-i18n="ui.badge.accessLayer"></div>
        <h1 class="h1" data-i18n="page.subs.title"></h1>
        <p class="lead" data-i18n="page.subs.subtitle"></p>
      </div>
      <div class="page-intro-stats">
        <div class="page-intro-stat"><span data-i18n="ui.stat.plan"></span><strong data-i18n="ui.stat.pro"></strong></div>
        <div class="page-intro-stat"><span data-i18n="ui.stat.status"></span><strong data-i18n="ui.stat.sync"></strong></div>
        <div class="page-intro-stat"><span data-i18n="ui.stat.term"></span><strong data-i18n="ui.stat.val30d"></strong></div>
      </div>
    </section>

    <section class="section page-shell-stack">
      <div class="section-title">
        <h2 data-i18n="page.subs.title"></h2>
        <p class="muted" data-i18n="page.subs.subtitle"></p>
      </div>
      <div class="card pad user-list-card">
        <div class="list" id="subs"></div>
        <div id="sub-detail" style="display:none"></div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="assets/js/i18n-fallback.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
