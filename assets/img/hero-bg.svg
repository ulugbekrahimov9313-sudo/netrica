<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f1a2d"/>
      <stop offset="1" stop-color="#111f36"/>
    </linearGradient>
    <radialGradient id="r1" cx="20%" cy="10%" r="70%">
      <stop offset="0" stop-color="#4f8cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="85%" cy="15%" r="65%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#r1)"/>
  <rect width="1600" height="900" fill="url(#r2)"/>

  <!-- Soft bokeh blobs -->
  <g filter="url(#blur)" opacity="0.55">
    <circle cx="280" cy="540" r="160" fill="#4f8cff" opacity="0.10"/>
    <circle cx="520" cy="600" r="220" fill="#2dd4bf" opacity="0.08"/>
    <circle cx="1150" cy="590" r="260" fill="#4f8cff" opacity="0.07"/>
    <circle cx="1360" cy="520" r="180" fill="#2dd4bf" opacity="0.07"/>
  </g>

  <!-- Subtle skyline-ish bars -->
  <g opacity="0.10">
    <rect x="0" y="660" width="1600" height="240" fill="#000"/>
    <g fill="#e8eefc">
      <rect x="120" y="700" width="26" height="130"/>
      <rect x="170" y="730" width="18" height="100"/>
      <rect x="230" y="690" width="34" height="160"/>
      <rect x="310" y="720" width="22" height="120"/>
      <rect x="380" y="760" width="16" height="90"/>
      <rect x="440" y="710" width="28" height="140"/>
      <rect x="520" y="740" width="20" height="110"/>
      <rect x="580" y="705" width="36" height="150"/>
      <rect x="680" y="735" width="22" height="120"/>
      <rect x="760" y="690" width="40" height="170"/>
      <rect x="860" y="720" width="26" height="140"/>
      <rect x="940" y="760" width="18" height="100"/>
      <rect x="1010" y="700" width="34" height="160"/>
      <rect x="1090" y="730" width="22" height="130"/>
      <rect x="1160" y="770" width="16" height="90"/>
      <rect x="1220" y="710" width="30" height="150"/>
      <rect x="1300" y="740" width="20" height="120"/>
      <rect x="1360" y="700" width="38" height="170"/>
    </g>
  </g>
</svg>
