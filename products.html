<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Netrica.com — Products</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="products">
  <div id="app-header"></div>

  <main id="main" class="container">
    <section class="section page-intro page-intro-products">
      <div class="page-intro-copy">
        <div class="hero-badge" data-i18n="ui.badge.productMesh"></div>
        <h1 class="h1" data-i18n="products.title"></h1>
        <p class="lead" data-i18n="products.subtitle"></p>
      </div>
      <div class="page-intro-stats">
        <div class="page-intro-stat"><span data-i18n="ui.stat.stack"></span><strong data-i18n="ui.stat.valAi"></strong></div>
        <div class="page-intro-stat"><span data-i18n="ui.stat.ops"></span><strong data-i18n="ui.stat.val247"></strong></div>
        <div class="page-intro-stat"><span data-i18n="ui.stat.flow"></span><strong data-i18n="ui.stat.sync"></strong></div>
      </div>
      <div class="page-intro-back-wrap">
        <a class="btn ghost" href="index.html" style="padding:8px 16px; font-size:12px">← Orqa</a>
      </div>
    </section>

    <section class="section section-panel">
      <div class="section-title">
        <h2 data-i18n="products.title"></h2>
        <p data-i18n="products.subtitle"></p>
      </div>
      <div id="products-grid" class="grid-3 product-grid"></div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="assets/js/i18n-fallback.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
