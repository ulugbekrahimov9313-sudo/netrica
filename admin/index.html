<!doctype html>
<html lang="uz">
<head>

  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-admin="1" data-page="admin-home">

  <div id="app-header"></div>

        <div class="card pad admin-panel-card">
          <div class="list">
            <div class="row"><div><b data-i18n="ui.adminPage.usersTitle"></b><div class="small" data-i18n="ui.adminPage.usersDesc"></div></div><a class="btn" href="users.html" data-i18n="ui.adminPage.open"></a></div>
            <div class="row"><div><b data-i18n="ui.adminPage.ordersTitle"></b><div class="small" data-i18n="ui.adminPage.ordersDesc"></div></div><span class="badge" id="admin-badge-orders" style="display:none"></span><a class="btn" href="orders.html" data-i18n="ui.adminPage.open"></a></div>

          </div>
        </div>
        <div style="text-align:right;margin-top:18px">
          <a href="../index.html" class="btn btn-outline" style="border-radius:999px;padding:10px 28px;font-size:14px">← Orqa</a>
        </div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="../assets/js/i18n-fallback.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/main.js"></script>

</html>
